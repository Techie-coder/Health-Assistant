<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0b5ed7">
  <meta name="description" content="AI healthcare guidance for rural communities">
  <link rel="manifest" href="manifest.json">
  <title>Healthcare Assistant</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="offline-banner" class="offline-banner hidden"></div>
  <div id="emergency-banner" class="emergency-banner hidden">
    <strong id="emergency-text"></strong>
    <button id="emergency-call" type="button">112 / 999</button>
  </div>

  <header class="header">
    <div>
      <h1 id="app-title">Healthcare Assistant</h1>
      <p id="app-subtitle" class="subtitle"></p>
    </div>
    <select id="lang-select" aria-label="Language">
      <option value="en">English</option>
      <option value="sw">Kiswahili</option>
    </select>
  </header>

  <nav class="tabs" role="tablist">
    <button class="tab active" data-tab="symptoms" id="tab-symptoms"></button>
    <button class="tab" data-tab="facilities" id="tab-facilities"></button>
    <button class="tab" data-tab="chat" id="tab-chat"></button>
    <button class="tab" data-tab="records" id="tab-records"></button>
  </nav>

  <main>
    <section id="panel-symptoms" class="panel active">
      <p class="disclaimer" id="disclaimer"></p>

      <label id="label-symptoms" for="symptoms"></label>
      <textarea id="symptoms" rows="4"></textarea>

      <div class="grid-2">
        <div>
          <label id="label-age" for="age-group"></label>
          <select id="age-group">
            <option value="child" id="opt-child"></option>
            <option value="adult" id="opt-adult"></option>
            <option value="elderly" id="opt-elderly"></option>
          </select>
        </div>
        <div>
          <label id="label-duration" for="duration"></label>
          <input type="number" id="duration" min="0" max="365" value="1">
        </div>
      </div>

      <div class="actions">
        <button id="voice-btn" type="button"></button>
        <button id="analyze-btn" type="button" class="btn-primary"></button>
      </div>

      <div id="result" class="result hidden"></div>
    </section>

    <section id="panel-facilities" class="panel">
      <div class="grid-2">
        <select id="facility-type">
          <option value="" id="filter-all"></option>
          <option value="hospital" id="filter-hospital"></option>
          <option value="clinic" id="filter-clinic"></option>
        </select>
        <button id="locate-btn" type="button" class="btn-primary"></button>
      </div>
      <div id="map" class="map"></div>
      <ul id="facility-list" class="list"></ul>
    </section>

    <section id="panel-chat" class="panel">
      <p class="hint" id="quick-topics-label"></p>
      <div class="chips">
        <button class="chip" data-topic="malaria">Malaria</button>
        <button class="chip" data-topic="hygiene">Hygiene</button>
        <button class="chip" data-topic="nutrition">Nutrition</button>
        <button class="chip" data-topic="pregnancy">Pregnancy</button>
      </div>
      <div id="chat-messages" class="chat-box"></div>
      <div class="chat-input">
        <input type="text" id="chat-input">
        <button id="chat-send" type="button" class="btn-primary"></button>
      </div>
    </section>

    <section id="panel-records" class="panel">
      <label id="phone-label" for="phone"></label>
      <input type="tel" id="phone" placeholder="+255...">
      <div class="actions">
        <button id="save-record" type="button" class="btn-primary"></button>
        <button id="load-history" type="button"></button>
      </div>
      <ul id="history-list" class="list"></ul>
    </section>
  </main>

  <footer class="footer">
    <small>&copy; 2026 Healthcare Assistant — For information only</small>
  </footer>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/voice.js"></script>
  <script src="js/map.js"></script>
  <script src="js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
  </script>
</body>
</html>
